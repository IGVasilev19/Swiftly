spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        show_sql: false
  flyway:
    enabled: true
    locations: classpath:db-persistence.migrations
  main:
    allow-bean-definition-overriding: true
  test:
    database:
      replace: none

logging:
  level:
    root: WARN
    org.springframework.test.context: INFO
security:
  jwt:
    secret: ${JWT-SECRET:test-jwt-secret}
