stages: [build, test]

variables:
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g"

cache:
  key: gradle-cache
  paths:
    - .gradle/wrapper
    - .gradle/caches
  policy: pull-push

build:
  stage: build
  script:
    - Set-Location "$env:CI_PROJECT_DIR\backend"
    - if (-not (Test-Path .\gradle\wrapper\gradle-wrapper.jar)) { Write-Error "Missing gradle-wrapper.jar in repo"; exit 1 }
    - if (-not (Test-Path .\gradle\wrapper\gradle-wrapper.properties)) { Write-Error "Missing gradle-wrapper.properties in repo"; exit 1 }
    - .\gradlew.bat :boot:build -x test --no-daemon
  artifacts:
    paths:
      - backend/**/build/libs/*.jar
    expire_in: 1 week

test:
  stage: test
  script:
    - Set-Location "$env:CI_PROJECT_DIR\backend"
    - .\gradlew.bat test --no-daemon
  dependencies:
    - build
  artifacts:
    when: always
    reports:
      junit: backend/**/build/test-results/test/*.xml
