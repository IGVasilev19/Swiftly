stages:
  - build
  - test

variables:
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g"

cache:
  key: "gradle-cache"
  paths:
    - .gradle/wrapper
    - .gradle/caches
  policy: pull-push

build:
  stage: build
  script:
    - cd backend
    - .\gradlew.bat clean assemble -x test --no-daemon
  artifacts:
    paths:
      - backend/build/libs/
    expire_in: 1 week

test:
  stage: test
  script:
    - cd backend
    - .\gradlew.bat test --no-daemon
  dependencies:
    - build
  artifacts:
    when: always
    reports:
      junit: backend/build/test-results/test/*.xml
