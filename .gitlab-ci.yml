stages:
  - build
  - test

build:
  stage: build
  image: eclipse-temurin:21-jdk
  script:
    - cd backend/VehicleRental
    - ./gradlew assemble --no-daemon
  artifacts:
    paths:
      - backend/VehicleRental/build/libs/
    expire_in: 1 week

test:
  stage: test
  image: eclipse-temurin:21-jdk
  script:
    - cd backend/VehicleRental
    - ./gradlew test --no-daemon
  dependencies:
    - build
  artifacts:
    when: always
    reports:
      junit: backend/VehicleRental/build/test-results/test/*.xml
