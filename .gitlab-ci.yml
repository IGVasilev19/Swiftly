stages:
  - test
  - sonar
  - build
  - push
  - deploy

variables:
  GRADLE_HOME_DIR: "D:/gcache/${CI_PROJECT_ID}/${CI_CONCURRENT_ID}"
  GRADLE_USER_HOME: "$GRADLE_HOME_DIR"
  GRADLE_VERSION: "8.10.2"
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g"

# -------------------------------------------------
# TEST + COVERAGE (SINGLE SOURCE OF TRUTH)
# -------------------------------------------------
tests:
  stage: test
  script:
    - "$ErrorActionPreference = 'Stop'"
    - "Set-Location $env:CI_PROJECT_DIR"

    - "$distDir = Join-Path $env:GRADLE_HOME_DIR 'dist'"
    - '$gradleHome = Join-Path $distDir ("gradle-" + $env:GRADLE_VERSION)'
    - '$gradleExe = Join-Path $gradleHome ''bin\gradle.bat'''

    - >
      if (-not (Test-Path $gradleExe)) {
        New-Item -ItemType Directory -Force -Path $distDir | Out-Null;
        $zipUrl = "https://services.gradle.org/distributions/gradle-$($env:GRADLE_VERSION)-bin.zip";
        $zipPath = Join-Path $distDir ("gradle-" + $env:GRADLE_VERSION + ".zip");
        Invoke-WebRequest -Uri $zipUrl -OutFile $zipPath;
        Expand-Archive -Path $zipPath -DestinationPath $distDir -Force;
        Remove-Item $zipPath -Force;
      }

    - 'Set-Location "$env:CI_PROJECT_DIR\backend"'
    - '& "$gradleExe" clean test jacocoRootReport --no-daemon "-Dspring.profiles.active=unit" -x integrationTest'

  artifacts:
    when: always
    paths:
      - backend/**/build

# -------------------------------------------------
# SONARQUBE (READ-ONLY ANALYSIS)
# -------------------------------------------------
sonarqube:
  stage: sonar
  script:
    - "$ErrorActionPreference = 'Stop'"
    - 'Set-Location "$env:CI_PROJECT_DIR\backend"'
    - '& "$env:GRADLE_HOME_DIR\dist\gradle-$env:GRADLE_VERSION\bin\gradle.bat" sonar --no-daemon'
  needs:
    - tests
  only:
    - main
  allow_failure: true

# -------------------------------------------------
# DOCKER BUILD
# -------------------------------------------------
build_images:
  stage: build
  script:
    - docker login -u $env:DOCKERHUB_USERNAME -p $env:DOCKERHUB_PASSWORD

    - pushd backend
    - cmd /C "docker build -t %DOCKERHUB_USERNAME%/swiftly-backend:%CI_COMMIT_SHA% ."
    - popd

    - pushd frontend
    - cmd /C "docker build -t %DOCKERHUB_USERNAME%/swiftly-frontend:%CI_COMMIT_SHA% ."
    - popd
  needs:
    - tests
  only:
    - main

# -------------------------------------------------
# DOCKER PUSH
# -------------------------------------------------
push_images:
  stage: push
  script:
    - docker login -u $env:DOCKERHUB_USERNAME -p $env:DOCKERHUB_PASSWORD

    - docker push "$env:DOCKERHUB_USERNAME/swiftly-backend:$env:CI_COMMIT_SHA"
    - docker push "$env:DOCKERHUB_USERNAME/swiftly-frontend:$env:CI_COMMIT_SHA"

    - docker tag "$env:DOCKERHUB_USERNAME/swiftly-backend:$env:CI_COMMIT_SHA" "$env:DOCKERHUB_USERNAME/swiftly-backend:latest"
    - docker tag "$env:DOCKERHUB_USERNAME/swiftly-frontend:$env:CI_COMMIT_SHA" "$env:DOCKERHUB_USERNAME/swiftly-frontend:latest"

    - docker push "$env:DOCKERHUB_USERNAME/swiftly-backend:latest"
    - docker push "$env:DOCKERHUB_USERNAME/swiftly-frontend:latest"
  needs:
    - build_images
  only:
    - main

# -------------------------------------------------
# DEPLOY
# -------------------------------------------------
deploy_local:
  stage: deploy
  script:
    - "$ErrorActionPreference = 'Stop'"
    - docker login -u $env:DOCKERHUB_USERNAME -p $env:DOCKERHUB_PASSWORD

    - Write-Host "Stopping existing containers..."
    - "try { docker stop swiftly-backend } catch { }"
    - "try { docker stop swiftly-frontend } catch { }"
    - "try { docker rm swiftly-backend } catch { }"
    - "try { docker rm swiftly-frontend } catch { }"

    - Write-Host "Pulling latest images..."
    - docker pull "$env:DOCKERHUB_USERNAME/swiftly-backend:latest"
    - docker pull "$env:DOCKERHUB_USERNAME/swiftly-frontend:latest"

    - Write-Host "Starting backend container..."
    - docker run -d --name swiftly-backend -p 8080:8080 --restart unless-stopped "$env:DOCKERHUB_USERNAME/swiftly-backend:latest"

    - Write-Host "Starting frontend container..."
    - docker run -d --name swiftly-frontend -p 3000:3000 --restart unless-stopped "$env:DOCKERHUB_USERNAME/swiftly-frontend:latest"

    - Write-Host "Deployment completed successfully"
  needs:
    - push_images
  only:
    - main
